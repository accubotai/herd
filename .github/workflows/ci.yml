name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"
  APT_DEPS: >-
    libdbus-1-dev
    pkg-config
    libwayland-dev
    libxkbcommon-dev
    libvulkan-dev

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y $APT_DEPS

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy (strict — deny all warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check for debug artifacts in production code
        run: |
          if grep -rn --include='*.rs' -E '^\s*(dbg!|todo!|unimplemented!)' crates/ | grep -v '#\[cfg(test)\]' | grep -v '/tests/' | grep -v 'test_' | head -1 | grep -q .; then
            echo "::error::Found dbg!/todo!/unimplemented! in non-test code"
            grep -rn --include='*.rs' -E '^\s*(dbg!|todo!|unimplemented!)' crates/ | grep -v '#\[cfg(test)\]' | grep -v '/tests/' | grep -v 'test_' | head -5
            exit 1
          fi

      - name: Check documentation builds
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Verify no unused dependencies
        run: |
          cargo install cargo-machete --quiet
          cargo machete || echo "::warning::cargo-machete found potentially unused dependencies"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y $APT_DEPS

      - name: Run tests (unit + property-based)
        run: cargo test --workspace

      - name: Verify test count is not regressing
        run: |
          COUNT=$(cargo test --workspace 2>&1 | grep -E "^test result:" | awk '{sum += $4} END {print sum}')
          echo "Total tests: $COUNT"
          if [ "$COUNT" -lt 100 ]; then
            echo "::error::Test count ($COUNT) dropped below minimum threshold (100)"
            exit 1
          fi

  msrv:
    name: Minimum Supported Rust Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.80.0

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y $APT_DEPS

      - name: Check MSRV compiles
        run: cargo check --workspace

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y $APT_DEPS

      - name: Build release
        run: cargo build --release

  deny:
    name: License & Advisory Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny --quiet

      - name: Check licenses and advisories
        run: cargo deny check
